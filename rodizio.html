<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Rodízio de Cultos — Sistema Completo</title>

<style>
:root{
  --border:#7a7a7a;
  --blue:#dbe7ff;
  --orange:#f4e0c8;
  --red:#f8d6d6;
  --titlebar:#cfcfcf;
}
body{font-family:Arial;margin:0;background:#f7f7f7}
.wrap{max-width:1100px;margin:18px auto;padding:16px;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.06)}
h1{text-align:center;margin:0 0 6px}
.sub{text-align:center;margin-bottom:12px}
.controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}
input,button{padding:8px}
button{cursor:pointer;border:1px solid #888;background:#eee}
.btn-primary{background:#2e6be6;color:#fff;border-color:#2e6be6}
.btn-pdf{background:#c62828;color:#fff;border-color:#b71c1c}
.card{padding:12px;border:1px solid var(--border);margin-bottom:12px}
textarea{width:100%;min-height:70px;margin-bottom:8px}
.title-bar{text-align:center;padding:8px;border:1px solid var(--border);background:var(--titlebar);font-weight:bold;margin-top:20px}
table{width:100%;border-collapse:collapse;margin-bottom:20px}
th,td{border:1px solid var(--border);padding:6px;text-align:center}
th{background:#e6e6e6}
.badge{padding:3px 6px;border-radius:6px;font-size:12px;font-weight:bold;color:#fff}

.batismo{background:#2e7d32}
.santaceia{background:#6a1b9a}
.especial{background:#ef6c00}
.aviso{background:#c62828}

.highlight{background:#fff8e1}

.comentario-box{
  padding:6px;
  border-radius:6px;
  font-weight:bold;
  margin-top:4px;
}

.comentario-batismo{ background:#e8f5e9; color:#1b5e20; }
.comentario-santaceia{ background:#f3e5f5; color:#4a148c; }
.comentario-especial{ background:#fff3e0; color:#e65100; }
.comentario-aviso{ background:#ffebee; color:#b71c1c; }

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<div class="wrap">
<h1>RODÍZIO MÊS DE <span id="previewMes"></span></h1>
<div class="sub">Congregação Cristã no Brasil</div>

<div class="controls">
<label>Mês:</label>
<input id="monthPick" type="month"/>
<button id="btnGenerate" class="btn-primary">Gerar Rodízio</button>
<button id="btnPDF" class="btn-pdf">Exportar PDF</button>
</div>

<div class="card">
<h3>Operadores (1 nome por linha)</h3>

<strong>Cultos (Dom/Ter/Qui)</strong>
<textarea id="opsCulto"></textarea>

<strong>Reunião Jovens</strong>
<textarea id="opsReuniao"></textarea>

<strong>Ensaio</strong>
<textarea id="opsEnsaio"></textarea>

<strong>Culto Jovens</strong>
<textarea id="opsCultoJovem"></textarea>
</div>

<div id="resultArea"></div>
</div>

<script>
const monthShort=['jan.','fev.','mar.','abr.','mai.','jun.','jul.','ago.','set.','out.','nov.','dez.'];
const dayName=['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];

function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function fmtShort(dt){return dt.getDate()+'-'+monthShort[dt.getMonth()];}
function parseArea(t){return t.split('\n').map(s=>s.trim()).filter(Boolean);}
function nthWeekday(y,m,w,n){let c=0;for(let d=1;d<=daysInMonth(y,m);d++){let dt=new Date(y,m,d);if(dt.getDay()==w){c++;if(c==n)return dt}}return null;}
function allWeekdays(y,m,wanted){let a=[];for(let d=1;d<=daysInMonth(y,m);d++){let dt=new Date(y,m,d);if(wanted.includes(dt.getDay()))a.push(dt)}return a;}

function getBadge(tipo){
if(tipo==="Batismo") return {badge:'<span class="badge batismo">BATISMO</span>',classe:'comentario-batismo'};
if(tipo==="Santa Ceia") return {badge:'<span class="badge santaceia">SANTA CEIA</span>',classe:'comentario-santaceia'};
if(tipo==="Especial") return {badge:'<span class="badge especial">ESPECIAL</span>',classe:'comentario-especial'};
if(tipo==="Aviso") return {badge:'<span class="badge aviso">AVISO</span>',classe:'comentario-aviso'};
return {badge:'',classe:''};
}

function sectionHTML(title,color,rows,tipo){
let hasComment=false;
rows.forEach(r=>{
let key=tipo+"_"+r.data+"_"+document.getElementById('monthPick').value;
if(localStorage.getItem(key)) hasComment=true;
});

let html=`<div class="title-bar" style="background:${color}">${title}</div>`;
html+=`<table><tr><th>DIA</th><th>DATA</th><th>IRMÃO</th>`;
if(hasComment) html+=`<th>OBSERVAÇÃO</th>`;
html+=`<th>AÇÃO</th></tr>`;

rows.forEach(r=>{
let key=tipo+"_"+r.data+"_"+document.getElementById('monthPick').value;
let dataObj=JSON.parse(localStorage.getItem(key)||"null");
let rowClass=dataObj?"highlight":"";

html+=`<tr class="${rowClass}">`;
html+=`<td>${r.dia}</td>`;
html+=`<td>${r.data}</td>`;
html+=`<td>${r.irmao}</td>`;

if(hasComment){
if(dataObj){
let info=getBadge(dataObj.tipo);
html+=`<td>
⚠️ ${info.badge}
<div class="comentario-box ${info.classe}">
${dataObj.texto}
</div>
</td>`;
}else{
html+=`<td></td>`;
}
}

html+=`<td><button onclick="editarComentario('${key}')">Comentar</button></td>`;
html+=`</tr>`;
});

html+=`</table>`;
return html;
}

function editarComentario(key){
let atual=JSON.parse(localStorage.getItem(key)||"null");

let tipo=prompt("Tipo (Batismo, Santa Ceia, Especial, Aviso):", atual?atual.tipo:"");
if(tipo===null) return;

let texto=prompt("Descrição:", atual?atual.texto:"");
if(texto===null) return;

if(texto.trim()===""){
localStorage.removeItem(key);
}else{
localStorage.setItem(key,JSON.stringify({tipo:tipo,texto:texto}));
}
gerarRodizio();
}

function gerarRodizio(){
const val=document.getElementById('monthPick').value;
if(!val) return alert("Selecione o mês");
const [y,m]=val.split('-').map(Number);
const mi=m-1;
document.getElementById('previewMes').textContent=monthShort[mi].toUpperCase()+" - "+y;

const opsCulto=parseArea(document.getElementById('opsCulto').value);
const opsReuniao=parseArea(document.getElementById('opsReuniao').value);
const opsEnsaio=parseArea(document.getElementById('opsEnsaio').value);
const opsCultoJov=parseArea(document.getElementById('opsCultoJovem').value);

let pC=0,pR=0,pE=0,pJ=0;

const cultoRows=allWeekdays(y,mi,[0,2,4]).map(dt=>({dia:dayName[dt.getDay()],data:fmtShort(dt),irmao:opsCulto[pC++%opsCulto.length||1]}));
const reuniaoRows=allWeekdays(y,mi,[0]).map(dt=>({dia:dayName[dt.getDay()],data:fmtShort(dt),irmao:opsReuniao[pR++%opsReuniao.length||1]}));
const dt2sexta=nthWeekday(y,mi,5,2);
const ensaioRows=dt2sexta?[{dia:dayName[dt2sexta.getDay()],data:fmtShort(dt2sexta),irmao:opsEnsaio[pE%opsEnsaio.length||1]}]:[];
const dt2sab=nthWeekday(y,mi,6,2);
const cultoJovRows=dt2sab?[{dia:dayName[dt2sab.getDay()],data:fmtShort(dt2sab),irmao:opsCultoJov[pJ%opsCultoJov.length||1]}]:[];

let out='';
out+=sectionHTML('CULTOS','#e6e6e6',cultoRows,'culto');
out+=sectionHTML('REUNIÃO DE JOVENS','#dbe7ff',reuniaoRows,'reuniao');
out+=sectionHTML('ENSAIO','#f4e0c8',ensaioRows,'ensaio');
out+=sectionHTML('CULTO DE JOVENS','#f8d6d6',cultoJovRows,'cultojovem');

document.getElementById('resultArea').innerHTML=out;
}

document.getElementById("btnPDF").addEventListener("click",()=>{
html2pdf().set({
margin:10,
filename:`Rodizio-${document.getElementById('previewMes').textContent}.pdf`,
html2canvas:{scale:2},
jsPDF:{unit:'mm',format:'a4'}
}).from(document.getElementById("resultArea")).save();
});

const now=new Date();
document.getElementById('monthPick').value=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,'0');
document.getElementById('previewMes').textContent=monthShort[now.getMonth()].toUpperCase()+" - "+now.getFullYear();

document.getElementById('btnGenerate').addEventListener('click',gerarRodizio);
gerarRodizio();
</script>

</body>
</html>
