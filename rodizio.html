<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Rodízio de Cultos</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4}
.wrap{max-width:1100px;margin:20px auto;padding:20px;background:#fff}
h1{text-align:center;margin-bottom:5px}
.sub{text-align:center;margin-bottom:15px}
.controls{text-align:center;margin-bottom:15px}
input,button{padding:6px;margin:4px}
button{cursor:pointer}
.card{border:1px solid #ccc;padding:10px;margin-bottom:15px}
textarea{width:100%;height:70px;margin-bottom:10px}
table{width:100%;border-collapse:collapse;margin-bottom:20px}
th,td{border:1px solid #999;padding:6px;text-align:center}
th{background:#eee}
.title{background:#ddd;padding:6px;font-weight:bold;text-align:center;margin-top:20px}

/* Comentário realmente colorido */
.comentario-batismo{background:#c8e6c9;color:#1b5e20;font-weight:bold}
.comentario-santaceia{background:#e1bee7;color:#4a148c;font-weight:bold}
.comentario-especial{background:#ffe0b2;color:#e65100;font-weight:bold}
.comentario-aviso{background:#ffcdd2;color:#b71c1c;font-weight:bold}

</style>
</head>
<body>

<div class="wrap">
<h1>RODÍZIO MÊS DE <span id="mes"></span></h1>
<div class="sub">Congregação Cristã no Brasil</div>

<div class="controls">
<input type="month" id="monthPick">
<button onclick="gerar()">Gerar</button>
</div>

<div class="card">
<strong>Cultos</strong>
<textarea id="culto"></textarea>

<strong>Reunião Jovens</strong>
<textarea id="reuniao"></textarea>

<strong>Ensaio</strong>
<textarea id="ensaio"></textarea>

<strong>Culto Jovens</strong>
<textarea id="cultojovem"></textarea>
</div>

<div id="resultado"></div>
</div>

<script>
const meses=['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
const dias=['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];

function diasNoMes(ano,mes){
return new Date(ano,mes+1,0).getDate();
}

function pegarLista(id){
let lista=document.getElementById(id).value.split('\n').map(x=>x.trim()).filter(x=>x);
return lista.length?lista:["-"];
}

function gerar(){

let valor=document.getElementById("monthPick").value;
if(!valor){alert("Escolha o mês");return;}

let [ano,mes]=valor.split("-");
mes=parseInt(mes)-1;

document.getElementById("mes").innerText=meses[mes]+" - "+ano;

let culto=pegarLista("culto");
let reuniao=pegarLista("reuniao");
let ensaio=pegarLista("ensaio");
let cultojovem=pegarLista("cultojovem");

let html="";

html+=montarTabela("CULTOS",[0,2,4],culto,"culto",ano,mes);
html+=montarTabela("REUNIÃO JOVENS",[0],reuniao,"reuniao",ano,mes);
html+=montarUnico("ENSAIO",5,2,ensaio,"ensaio",ano,mes);
html+=montarUnico("CULTO JOVENS",6,2,cultojovem,"cultojovem",ano,mes);

document.getElementById("resultado").innerHTML=html;
}

function montarTabela(titulo,diasSemana,lista,tipo,ano,mes){

let html=`<div class="title">${titulo}</div>`;
html+="<table><tr><th>Dia</th><th>Data</th><th>Irmão</th><th>Obs</th><th>Ação</th></tr>";

let contador=0;

for(let d=1; d<=diasNoMes(ano,mes); d++){
let data=new Date(ano,mes,d);
if(diasSemana.includes(data.getDay())){

let chave=tipo+"_"+d+"_"+mes+"_"+ano;
let comentario=JSON.parse(localStorage.getItem(chave)||"null");

let classe="";
if(comentario){
if(comentario.tipo==="Batismo") classe="comentario-batismo";
if(comentario.tipo==="Santa Ceia") classe="comentario-santaceia";
if(comentario.tipo==="Especial") classe="comentario-especial";
if(comentario.tipo==="Aviso") classe="comentario-aviso";
}

html+=`<tr>
<td>${dias[data.getDay()]}</td>
<td>${d}</td>
<td>${lista[contador%lista.length]}</td>
<td class="${classe}">${comentario?comentario.texto:""}</td>
<td><button onclick="editar('${chave}')">Comentar</button></td>
</tr>`;

contador++;
}
}

html+="</table>";
return html;
}

function montarUnico(titulo,diaSemana,ordem,lista,tipo,ano,mes){

let html=`<div class="title">${titulo}</div>`;
html+="<table><tr><th>Dia</th><th>Data</th><th>Irmão</th><th>Obs</th><th>Ação</th></tr>";

let count=0;
let alvo=null;

for(let d=1; d<=diasNoMes(ano,mes); d++){
let data=new Date(ano,mes,d);
if(data.getDay()===diaSemana){
count++;
if(count===ordem){alvo=d;break;}
}
}

if(alvo){
let chave=tipo+"_"+alvo+"_"+mes+"_"+ano;
let comentario=JSON.parse(localStorage.getItem(chave)||"null");

let classe="";
if(comentario){
if(comentario.tipo==="Batismo") classe="comentario-batismo";
if(comentario.tipo==="Santa Ceia") classe="comentario-santaceia";
if(comentario.tipo==="Especial") classe="comentario-especial";
if(comentario.tipo==="Aviso") classe="comentario-aviso";
}

html+=`<tr>
<td>${dias[diaSemana]}</td>
<td>${alvo}</td>
<td>${lista[0]}</td>
<td class="${classe}">${comentario?comentario.texto:""}</td>
<td><button onclick="editar('${chave}')">Comentar</button></td>
</tr>`;
}

html+="</table>";
return html;
}

function editar(chave){
let tipo=prompt("Tipo (Batismo, Santa Ceia, Especial, Aviso):");
if(tipo===null)return;

let texto=prompt("Descrição:");
if(texto===null)return;

if(texto.trim()===""){
localStorage.removeItem(chave);
}else{
localStorage.setItem(chave,JSON.stringify({tipo:tipo,texto:texto}));
}
gerar();
}

</script>
</body>
</html>
