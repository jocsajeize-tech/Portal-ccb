<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Rodízio CCB</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    padding: 20px;
}

h1 {
    text-align: center;
}

.container {
    max-width: 1000px;
    margin: auto;
}

select, input, button {
    padding: 8px;
    margin: 5px 0;
}

button {
    cursor: pointer;
    background: #0d6efd;
    color: white;
    border: none;
    border-radius: 5px;
}

button:hover {
    background: #0b5ed7;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
    background: white;
}

th, td {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
}

th {
    background: #0d6efd;
    color: white;
}

.batismo-box {
    background: #e9f2ff;
    padding: 15px;
    margin-top: 30px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>RODÍZIO DE CULTOS</h1>

<label><strong>Escolha a Igreja:</strong></label><br>
<select id="igrejaSelect" onchange="carregarTudo()">
    <option value="central">Central</option>
    <option value="alto">Alto da Boa Vista</option>
    <option value="outras">Outras Localidades</option>
</select>

<hr>

<h2>Cultos</h2>

<input type="date" id="dataCulto">
<input type="text" id="responsavelCulto" placeholder="Nome do responsável">
<button onclick="adicionarCulto()">Adicionar Culto</button>

<table>
    <thead>
        <tr>
            <th>Data</th>
            <th>Responsável</th>
            <th>Remover</th>
        </tr>
    </thead>
    <tbody id="tabelaCultos"></tbody>
</table>

<div class="batismo-box">
    <h2>Batismos</h2>
    <input type="date" id="dataBatismo">
    <button onclick="adicionarBatismo()">Adicionar Batismo</button>

    <table>
        <thead>
            <tr>
                <th>Data de Batismo</th>
                <th>Remover</th>
            </tr>
        </thead>
        <tbody id="tabelaBatismo"></tbody>
    </table>
</div>

</div>

<script>

function chave(tipo) {
    const igreja = document.getElementById("igrejaSelect").value;
    return igreja + "_" + tipo;
}

/* ================= CULTOS ================= */

function adicionarCulto() {
    const data = document.getElementById("dataCulto").value;
    const nome = document.getElementById("responsavelCulto").value;

    if (!data || !nome) {
        alert("Preencha todos os campos!");
        return;
    }

    const dados = JSON.parse(localStorage.getItem(chave("cultos"))) || [];
    dados.push({ data, nome });

    localStorage.setItem(chave("cultos"), JSON.stringify(dados));

    document.getElementById("dataCulto").value = "";
    document.getElementById("responsavelCulto").value = "";

    carregarCultos();
}

function carregarCultos() {
    const tabela = document.getElementById("tabelaCultos");
    tabela.innerHTML = "";

    const dados = JSON.parse(localStorage.getItem(chave("cultos"))) || [];

    dados.forEach((item, index) => {
        const linha = tabela.insertRow();
        linha.insertCell(0).innerText = item.data;
        linha.insertCell(1).innerText = item.nome;

        const btn = document.createElement("button");
        btn.innerText = "Excluir";
        btn.onclick = () => removerCulto(index);

        linha.insertCell(2).appendChild(btn);
    });
}

function removerCulto(index) {
    const dados = JSON.parse(localStorage.getItem(chave("cultos"))) || [];
    dados.splice(index, 1);
    localStorage.setItem(chave("cultos"), JSON.stringify(dados));
    carregarCultos();
}

/* ================= BATISMOS ================= */

function adicionarBatismo() {
    const data = document.getElementById("dataBatismo").value;

    if (!data) {
        alert("Escolha uma data!");
        return;
    }

    const dados = JSON.parse(localStorage.getItem(chave("batismos"))) || [];
    dados.push(data);

    localStorage.setItem(chave("batismos"), JSON.stringify(dados));

    document.getElementById("dataBatismo").value = "";
    carregarBatismos();
}

function carregarBatismos() {
    const tabela = document.getElementById("tabelaBatismo");
    tabela.innerHTML = "";

    const dados = JSON.parse(localStorage.getItem(chave("batismos"))) || [];

    dados.forEach((data, index) => {
        const linha = tabela.insertRow();
        linha.insertCell(0).innerText = data;

        const btn = document.createElement("button");
        btn.innerText = "Excluir";
        btn.onclick = () => removerBatismo(index);

        linha.insertCell(1).appendChild(btn);
    });
}

function removerBatismo(index) {
    const dados = JSON.parse(localStorage.getItem(chave("batismos"))) || [];
    dados.splice(index, 1);
    localStorage.setItem(chave("batismos"), JSON.stringify(dados));
    carregarBatismos();
}

/* ================= GERAL ================= */

function carregarTudo() {
    carregarCultos();
    carregarBatismos();
}

window.onload = carregarTudo;

</script>

</body>
</html>
