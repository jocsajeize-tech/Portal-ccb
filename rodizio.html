<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Rodízio de Cultos — Sequência Contínua</title>

<style>
  :root{
    --border:#7a7a7a;
    --header-bg:#6f6f6f;
    --sheet-bg:#f3f3f3;
    --blue:#dbe7ff;
    --orange:#f4e0c8;
    --red:#f8d6d6;
    --titlebar:#cfcfcf;
  }
  body{
    font-family: Arial, sans-serif;
    margin:0; background:#f7f7f7; color:#111;
  }
  .wrap{max-width:1100px;margin:18px auto;padding:16px;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.06)}
  h1{font-size:28px;margin:0 0 6px;text-align:center}
  .sub{ text-align:center;color:#333;margin-bottom:12px }

  .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:center;margin-bottom:12px}
  input[type="month"], select, button{padding:8px;font-size:14px}
  button{cursor:pointer;border:1px solid #888;background:#eee}
  .btn-primary{background:#2e6be6;color:#fff;border-color:#2e6be6}
  .btn-pdf{background:#c62828;color:#fff;border-color:#b71c1c}

  .panel{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px}
  .card{flex:1 1 360px;padding:12px;border:1px solid var(--border);background: #fff}
  .card h3{margin:0 0 8px;font-size:16px}
  .card label {display:block; margin-top:10px;}
  
  /* Estilo modificado para indicar que o campo está protegido por padrão */
  textarea.oper{
    width:100%;
    min-height:90px;
    font-size:14px;
    padding:8px;
    border:1px solid #bbb;
    box-sizing: border-box;
    resize:vertical;
    background-color: #fafafa;
    cursor: pointer;
  }
  textarea.oper:focus {
    outline: none;
  }

  .title-bar{display:block;text-align:center;padding:8px;border:1px solid var(--border);background:var(--titlebar);font-weight:700;margin-bottom:8px}
  table.sheet{width:100%;border-collapse:collapse;margin:8px 0 18px;font-size:14px}
  table.sheet th, table.sheet td{border:1px solid var(--border);padding:8px;vertical-align:middle}
  table.sheet th{background:#e6e6e6;font-weight:700;text-align:left}

  @media (max-width:820px){
    .panel{flex-direction:column}
    .card{min-width:unset}
  }
  
  @media print {
    body { background: #fff; }
    .wrap { box-shadow: none; margin: 0; padding: 0; }
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>
<body>
<div class="wrap">
  <h1>RODÍZIO MÊS DE <span id="previewMes">—</span></h1>
  <div class="sub">Congregação Cristã no Brasil</div>

  <div class="controls">
    <label for="monthPick">Mês:</label>
    <input id="monthPick" type="month" />
    <button id="btnGenerate" class="btn-primary">Gerar Rodízio</button>
    <button id="btnPDF" class="btn-pdf">Exportar PDF</button>
  </div>

  <div class="panel">
    <div class="card">
      <h3>Operadores — Sequência Base (Clique para editar com senha)</h3>

      <label><strong>Culto (Dom / Ter / Qui)</strong></label>
      <textarea id="opsCulto" class="oper" readonly onclick="verificarSenha(this)">CESA
ROMULO
DANIEL
FABIO</textarea>

      <label><strong>Reunião de Jovens (Todos os domingos)</strong></label>
      <textarea id="opsReuniao" class="oper" readonly onclick="verificarSenha(this)">DANIEL F.N
JONATAS</textarea>

      <label><strong>Ensaio Local</strong></label>
      <textarea id="opsEnsaio" class="oper" readonly onclick="verificarSenha(this)">JONATAS</textarea>

      <label><strong>Culto de Jovens</strong></label>
      <textarea id="opsCultoJovem" class="oper" readonly onclick="verificarSenha(this)">FABIO</textarea>
    </div>
  </div>

  <div id="resultArea"></div>
</div>

<script>
const monthShort = ['JAN.','FEV.','MAR.','ABR.','MAI.','JUN.','JUL.','AGO.','SET.','OUT.','NOV.','DEZ.'];
const dayName = ['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];

const SEMANA_ENSAIO = 2;      
const SEMANA_CULTO_JOVEM = 2; 

// 🔑 CONFIGURAÇÃO DA SENHA (Mude aqui se quiser outra senha)
const SENHA_CORRETA = "1234";
let editadoLiberado = false;

// Mês base fixado estritamente em Junho de 2026 para cálculo de transições
const REF_YEAR = 2026;
const REF_MONTH = 5; // Junho (Base 0)

function daysInMonth(year, mIdx){ return new Date(year, mIdx+1, 0).getDate(); }
function fmtShort(dt){ return dt.getDate() + '-' + monthShort[dt.getMonth()].toLowerCase(); }

// Função para validar o acesso às caixas de texto
function verificarSenha(elemento) {
  if (editadoLiberado) return; // Se já foi liberado, não pede novamente nesta sessão

  const senhaDigitada = prompt("Digite a senha para liberar a alteração da ordem dos irmãos:");
  
  if (senhaDigitada === SENHA_CORRETA) {
    editadoLiberado = true;
    // Libera todos os textareas removendo o atributo 'readonly' e mudando o visual
    const campos = document.querySelectorAll('textarea.oper');
    campos.forEach(campo => {
      campo.removeAttribute('readonly');
      campo.style.backgroundColor = "#ffffff";
      campo.style.cursor = "text";
    });
    elemento.focus(); // Coloca o cursor no campo que o usuário clicou
  } else if (senhaDigitada !== null) {
    alert("Senha incorreta! A ordem não foi liberada para edição.");
  }
}

function nthWeekday(year, monthIdx, weekday, n){
  let count=0;
  for(let d=1; d<=daysInMonth(year, monthIdx); d++){
    const dt = new Date(year, monthIdx, d, 12, 0, 0);
    if(dt.getDay()===weekday){ 
      count++; 
      if(count===n) return dt; 
    }
  }
  return null;
}

function allWeekdays(year, monthIdx, wanted){ 
  const arr=[]; 
  for(let d=1; d<=daysInMonth(year, monthIdx); d++){ 
    const dt = new Date(year, monthIdx, d, 12, 0, 0); 
    if(wanted.includes(dt.getDay())) arr.push(dt); 
  } 
  return arr; 
}

function parseArea(text){ return text.split('\n').map(s=>s.trim()).filter(s=>s.length>0); }

function countEventsSinceRef(targetYear, targetMonth, wantedDays) {
  let totalEvents = 0;
  let start = new Date(REF_YEAR, REF_MONTH, 1, 12, 0, 0);
  let end = new Date(targetYear, targetMonth, 1, 12, 0, 0);
  
  if (start.getTime() === end.getTime()) return 0;
  
  if (end < start) {
    let current = new Date(end);
    while (current < start) {
      totalEvents -= allWeekdays(current.getFullYear(), current.getMonth(), wantedDays).length;
      current.setMonth(current.getMonth() + 1);
    }
    return totalEvents;
  } else {
    let current = new Date(start);
    while (current < end) {
      totalEvents += allWeekdays(current.getFullYear(), current.getMonth(), wantedDays).length;
      current.setMonth(current.getMonth() + 1);
    }
    return totalEvents;
  }
}

function countMonthlyEventsSinceRef(targetYear, targetMonth, weekday, nthWeek) {
  let totalEvents = 0;
  let start = new Date(REF_YEAR, REF_MONTH, 1, 12, 0, 0);
  let end = new Date(targetYear, targetMonth, 1, 12, 0, 0);
  
  if (start.getTime() === end.getTime()) return 0;
  
  if (end < start) {
    let current = new Date(end);
    while (current < start) {
      if (nthWeekday(current.getFullYear(), current.getMonth(), weekday, nthWeek)) totalEvents--;
      current.setMonth(current.getMonth() + 1);
    }
    return totalEvents;
  } else {
    let current = new Date(start);
    while (current < end) {
      if (nthWeekday(current.getFullYear(), current.getMonth(), weekday, nthWeek)) totalEvents++;
      current.setMonth(current.getMonth() + 1);
    }
    return totalEvents;
  }
}

function sectionHTML(title, color, rows){
  if (rows.length === 0) return ''; 
  let html = `<div class="title-bar" style="background:${color}">${title}</div>`;
  html += `<table class="sheet"><tr><th style="width: 30%;">DIA</th><th style="width: 25%;">DATA</th><th>IRMÃO</th></tr>`;
  rows.forEach(r => html += `<tr><td>${r.dia}</td><td>${r.data}</td><td>${r.irmao}</td></tr>`);
  html += `</table>`;
  return html;
}

function gerarRodizio(){
  const monthVal = document.getElementById('monthPick').value;
  if(!monthVal) return alert('Selecione o mês.');
  const [y,m] = monthVal.split('-').map(Number);
  const mi = m - 1;
  document.getElementById('previewMes').textContent = monthShort[mi] + ' - ' + y;

  const opsCulto = parseArea(document.getElementById('opsCulto').value);
  const opsReuniao = parseArea(document.getElementById('opsReuniao').value);
  const opsEnsaio = parseArea(document.getElementById('opsEnsaio').value);
  const opsCultoJov = parseArea(document.getElementById('opsCultoJovem').value);

  if([opsCulto, opsReuniao, opsEnsaio, opsCultoJov].some(arr => arr.length === 0)){
    alert("Por favor, garanta que há nomes preenchidos nos campos.");
    return;
  }

  // 1. CULTOS OFICIAIS
  let cultosPassados = countEventsSinceRef(y, mi, [0, 2, 4]);
  let pC = (cultosPassados % opsCulto.length + opsCulto.length) % opsCulto.length;

  const cultoDates = allWeekdays(y, mi, [0,2,4]);
  const cultoRows = cultoDates.map(dt => ({
    dia: dayName[dt.getDay()],
    data: fmtShort(dt),
    irmao: opsCulto[pC++ % opsCulto.length]
  }));

  // 2. REUNIÃO DE JOVENS
  let reunioesPassadas = countEventsSinceRef(y, mi, [0]);
  let pR = (reunioesPassadas % opsReuniao.length + opsReuniao.length) % opsReuniao.length;

  const doms = allWeekdays(y, mi, [0]);
  const reuniaoRows = doms.map(dt => ({
    dia: dayName[dt.getDay()],
    data: fmtShort(dt),
    irmao: opsReuniao[pR++ % opsReuniao.length]
  }));

  // 3. ENSAIO LOCAL
  let ensaiosPassados = countMonthlyEventsSinceRef(y, mi, 5, SEMANA_ENSAIO);
  let pE = (ensaiosPassados % opsEnsaio.length + opsEnsaio.length) % opsEnsaio.length;

  const dtSexta = nthWeekday(y, mi, 5, SEMANA_ENSAIO);
  const ensaioRows = dtSexta ? [{
    dia: dayName[dtSexta.getDay()],
    data: fmtShort(dtSexta),
    irmao: opsEnsaio[pE++ % opsEnsaio.length]
  }] : [];

  // 4. CULTO DE JOVENS
  let cultosJovensPassados = countMonthlyEventsSinceRef(y, mi, 6, SEMANA_CULTO_JOVEM);
  let pJ = (cultosJovensPassados % opsCultoJov.length + opsCultoJov.length) % opsCultoJov.length;

  const dtSab = nthWeekday(y, mi, 6, SEMANA_CULTO_JOVEM);
  const cultoJovRows = dtSab ? [{
    dia: dayName[dtSab.getDay()],
    data: fmtShort(dtSab),
    irmao: opsCultoJov[pJ++ % opsCultoJov.length]
  }] : [];

  let out = '';
  out += sectionHTML('CULTOS:', '#e6e6e6', cultoRows);
  out += sectionHTML('REUNIÃO DE JOVENS:', 'var(--blue)', reuniaoRows);
  out += sectionHTML('ENSAIO:', 'var(--orange)', ensaioRows);
  out += sectionHTML('CULTO DE JOVENS:', 'var(--red)', cultoJovRows);

  document.getElementById('resultArea').innerHTML = out;
}

document.getElementById("btnPDF").addEventListener("click", () => {
  const area = document.getElementById("resultArea");
  const mesTexto = document.getElementById('previewMes').textContent;

  const opt = {
    margin: 12,
    filename: `Rodizio_Cultos_${mesTexto}.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  html2pdf().set(opt).from(area).save();
});

// Inicializa no mês atual (Junho de 2026)
const now = new Date();
document.getElementById('monthPick').value =
  now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');

document.getElementById('btnGenerate').addEventListener('click', gerarRodizio);

// Executa automaticamente na abertura
gerarRodizio();
</script>

</body>
</html>
