<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Rodízio CCB</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    padding: 20px;
}

h1 {
    text-align: center;
}

.container {
    max-width: 900px;
    margin: auto;
}

select, input, button {
    padding: 8px;
    margin: 5px 0;
}

button {
    cursor: pointer;
    background: #0d6efd;
    color: white;
    border: none;
    border-radius: 5px;
}

button:hover {
    background: #0b5ed7;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
    background: white;
}

th, td {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
}

th {
    background: #0d6efd;
    color: white;
}

.batismo-box {
    background: #e9f2ff;
    padding: 15px;
    margin-top: 20px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>RODÍZIO DE CULTOS</h1>

<label><strong>Escolha a Igreja:</strong></label><br>
<select id="igrejaSelect" onchange="carregarDados()">
    <option value="central">Central</option>
    <option value="alto">Alto da Boa Vista</option>
    <option value="outras">Outras Localidades</option>
</select>

<div class="batismo-box">
    <h3>Adicionar Dia de Batismo</h3>
    <input type="date" id="dataBatismo">
    <button onclick="adicionarBatismo()">Adicionar</button>
</div>

<table>
    <thead>
        <tr>
            <th>Datas de Batismo</th>
            <th>Remover</th>
        </tr>
    </thead>
    <tbody id="tabelaBatismo">
    </tbody>
</table>

</div>

<script>

function chaveAtual() {
    const igreja = document.getElementById("igrejaSelect").value;
    return "batismos_" + igreja;
}

function carregarDados() {
    const tabela = document.getElementById("tabelaBatismo");
    tabela.innerHTML = "";

    const dados = JSON.parse(localStorage.getItem(chaveAtual())) || [];

    dados.forEach((data, index) => {
        const linha = tabela.insertRow();
        linha.insertCell(0).innerText = data;

        const btn = document.createElement("button");
        btn.innerText = "Excluir";
        btn.onclick = function() {
            removerBatismo(index);
        };

        linha.insertCell(1).appendChild(btn);
    });
}

function adicionarBatismo() {
    const input = document.getElementById("dataBatismo");
    if (!input.value) return alert("Escolha uma data!");

    const dados = JSON.parse(localStorage.getItem(chaveAtual())) || [];
    dados.push(input.value);

    localStorage.setItem(chaveAtual(), JSON.stringify(dados));
    input.value = "";
    carregarDados();
}

function removerBatismo(index) {
    const dados = JSON.parse(localStorage.getItem(chaveAtual())) || [];
    dados.splice(index, 1);
    localStorage.setItem(chaveAtual(), JSON.stringify(dados));
    carregarDados();
}

window.onload = carregarDados;

</script>

</body>
</html>
