<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Rodízio de Cultos — Gerador Automático</title>

<style>
  :root{
    --border:#7a7a7a;
    --header-bg:#6f6f6f;
    --sheet-bg:#f3f3f3;
    --blue:#dbe7ff;
    --orange:#f4e0c8;
    --red:#f8d6d6;
    --titlebar:#cfcfcf;
  }
  body{
    font-family: Arial, sans-serif;
    margin:0; background:#f7f7f7; color:#111;
  }
  .wrap{max-width:1100px;margin:18px auto;padding:16px;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.06)}
  h1{font-size:28px;margin:0 0 6px;text-align:center}
  .sub{ text-align:center;color:#333;margin-bottom:12px }

  .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:center;margin-bottom:12px}
  input[type="month"], select, button{padding:8px;font-size:14px}
  button{cursor:pointer;border:1px solid #888;background:#eee}
  .btn-primary{background:#2e6be6;color:#fff;border-color:#2e6be6}
  .btn-pdf{background:#c62828;color:#fff;border-color:#b71c1c}

  .panel{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px}
  .card{flex:1 1 360px;padding:12px;border:1px solid var(--border);background: #fff}
  .card h3{margin:0 0 8px;font-size:16px}
  .card label {display:block; margin-top:10px;}
  textarea.oper{width:100%;min-height:90px;font-size:14px;padding:8px;border:1px solid #bbb;box-sizing: border-box; resize:vertical}

  .title-bar{display:block;text-align:center;padding:8px;border:1px solid var(--border);background:var(--titlebar);font-weight:700;margin-bottom:8px}
  table.sheet{width:100%;border-collapse:collapse;margin:8px 0 18px;font-size:14px}
  table.sheet th, table.sheet td{border:1px solid var(--border);padding:8px;vertical-align:middle}
  table.sheet th{background:#e6e6e6;font-weight:700;text-align:left}

  @media (max-width:820px){
    .panel{flex-direction:column}
    .card{min-width:unset}
  }
  
  @media print {
    body { background: #fff; }
    .wrap { box-shadow: none; margin: 0; padding: 0; }
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>
<body>
<div class="wrap">
  <h1>RODÍZIO MÊS DE <span id="previewMes">—</span></h1>
  <div class="sub">Congregação Cristã no Brasil</div>

  <div class="controls">
    <label for="monthPick">Mês:</label>
    <input id="monthPick" type="month" />
    <button id="btnGenerate" class="btn-primary">Gerar Rodízio</button>
    <button id="btnPDF" class="btn-pdf">Exportar PDF</button>
  </div>

  <div class="panel">
    <div class="card">
      <h3>Operadores — cada nome em uma linha</h3>

      <label><strong>Culto (Dom / Ter / Qui)</strong></label>
      <textarea id="opsCulto" class="oper">ABIMAEL
DANIEL
FABIO
JONATAS</textarea>

      <label><strong>Reunião de Jovens (Todos os domingos)</strong></label>
      <textarea id="opsReuniao" class="oper">ABIMAEL
DANIEL FEIRA NOVA</textarea>

      <label><strong>Ensaio Local</strong></label>
      <textarea id="opsEnsaio" class="oper">JONATAS</textarea>

      <label><strong>Culto de Jovens</strong></label>
      <textarea id="opsCultoJovem" class="oper">FABIO</textarea>

    </div>
  </div>

  <div id="resultArea"></div>
</div>

<script>
const monthShort = ['JAN.','FEV.','MAR.','ABR.','MAI.','JUN.','JUL.','AGO.','SET.','OUT.','NOV.','DEZ.'];
const dayName = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];

const SEMANA_ENSAIO = 2;      
const SEMANA_CULTO_JOVEM = 2; 

function daysInMonth(year, mIdx){ return new Date(year, mIdx+1, 0).getDate(); }
function fmtShort(dt){ return dt.getDate() + '-' + monthShort[dt.getMonth()].toLowerCase(); }

function nthWeekday(year, monthIdx, weekday, n){
  let count=0;
  for(let d=1; d<=daysInMonth(year, monthIdx); d++){
    const dt = new Date(year, monthIdx, d, 12, 0, 0);
    if(dt.getDay()===weekday){ 
      count++; 
      if(count===n) return dt; 
    }
  }
  return null;
}

function allWeekdays(year, monthIdx, wanted){ 
  const arr=[]; 
  for(let d=1; d<=daysInMonth(year, monthIdx); d++){ 
    const dt = new Date(year, monthIdx, d, 12, 0, 0); 
    if(wanted.includes(dt.getDay())) arr.push(dt); 
  } 
  return arr; 
}

function parseArea(text){ return text.split('\n').map(s=>s.trim()).filter(s=>s.length>0); }

// Retorna os nomes salvos no navegador (caso o usuário mude os digitados)
function loadSavedNames() {
  if(localStorage.getItem('opsCulto')) document.getElementById('opsCulto').value = localStorage.getItem('opsCulto');
  if(localStorage.getItem('opsReuniao')) document.getElementById('opsReuniao').value = localStorage.getItem('opsReuniao');
  if(localStorage.getItem('opsEnsaio')) document.getElementById('opsEnsaio').value = localStorage.getItem('opsEnsaio');
  if(localStorage.getItem('opsCultoJovem')) document.getElementById('opsCultoJovem').value = localStorage.getItem('opsCultoJovem');
}

function saveNames() {
  localStorage.setItem('opsCulto', document.getElementById('opsCulto').value);
  localStorage.setItem('opsReuniao', document.getElementById('opsReuniao').value);
  localStorage.setItem('opsEnsaio', document.getElementById('opsEnsaio').value);
  localStorage.setItem('opsCultoJovem', document.getElementById('opsCultoJovem').value);
}

// 🔀 Algoritmo Psico-aleatório: Embaralha a lista baseado no Ano e Mês selecionado.
// Isso garante que a sequência mude todo mês, mas se você reabrir o mesmo mês, os dados continuam iguais.
function shuffleListByMonth(array, year, monthIdx) {
  let shuffled = [...array];
  let seed = year + monthIdx; 
  for (let i = shuffled.length - 1; i > 0; i--) {
    const x = Math.sin(seed++) * 10000;
    const j = Math.floor((x - Math.floor(x)) * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled;
}

function sectionHTML(title, color, rows){
  if (rows.length === 0) return ''; 
  let html = `<div class="title-bar" style="background:${color}">${title}</div>`;
  html += `<table class="sheet"><tr><th style="width: 30%;">DIA</th><th style="width: 25%;">DATA</th><th>IRMÃO</th></tr>`;
  rows.forEach(r => html += `<tr><td>${r.dia}</td><td>${r.data}</td><td><strong>${r.irmao}</strong></td></tr>`);
  html += `</table>`;
  return html;
}

function gerarRodizio(){
  saveNames(); // Salva os nomes digitados atualizados
  
  const monthVal = document.getElementById('monthPick').value;
  if(!monthVal) return alert('Selecione o mês.');
  const [y,m] = monthVal.split('-').map(Number);
  const mi = m - 1;
  document.getElementById('previewMes').textContent = monthShort[mi] + ' - ' + y;

  // Carrega e gera listas únicas rotativas para o mês corrente baseado no embaralhamento matemático
  const opsCulto = shuffleListByMonth(parseArea(document.getElementById('opsCulto').value), y, mi);
  const opsReuniao = shuffleListByMonth(parseArea(document.getElementById('opsReuniao').value), y, mi + 1); // Diferencia semente
  const opsEnsaio = shuffleListByMonth(parseArea(document.getElementById('opsEnsaio').value), y, mi + 2);
  const opsCultoJov = shuffleListByMonth(parseArea(document.getElementById('opsCultoJovem').value), y, mi + 3);

  if([opsCulto, opsReuniao, opsEnsaio, opsCultoJov].some(arr => arr.length === 0)){
    alert("Por favor, preencha pelo menos um nome em cada lista de operadores.");
    return;
  }

  let pC=0, pR=0, pE=0, pJ=0;

  // Cultos oficiais
  const cultoDates = allWeekdays(y, mi, [0,2,4]);
  const cultoRows = cultoDates.map(dt => ({
    dia: dayName[dt.getDay()],
    data: fmtShort(dt),
    irmao: opsCulto[pC++ % opsCulto.length]
  }));

  // Reunião de Jovens
  const doms = allWeekdays(y, mi, [0]);
  const reuniaoRows = doms.map(dt => ({
    dia: dayName[dt.getDay()],
    data: fmtShort(dt),
    irmao: opsReuniao[pR++ % opsReuniao.length]
  }));

  // Ensaio Local
  const dtSexta = nthWeekday(y, mi, 5, SEMANA_ENSAIO);
  const ensaioRows = dtSexta ? [{
    dia: dayName[dtSexta.getDay()],
    data: fmtShort(dtSexta),
    irmao: opsEnsaio[pE++ % opsEnsaio.length]
  }] : [];

  // Culto de Jovens
  const dtSab = nthWeekday(y, mi, 6, SEMANA_CULTO_JOVEM);
  const cultoJovRows = dtSab ? [{
    dia: dayName[dtSab.getDay()],
    data: fmtShort(dtSab),
    irmao: opsCultoJov[pJ++ % opsCultoJov.length]
  }] : [];

  let out = '';
  out += sectionHTML('CULTOS OFICIAIS:', '#e6e6e6', cultoRows);
  out += sectionHTML('REUNIÃO DE JOVENS E MENORES:', 'var(--blue)', reuniaoRows);
  out += sectionHTML('ENSAIO LOCAL:', 'var(--orange)', ensaioRows);
  out += sectionHTML('CULTO DE JOVENS E MENORES:', 'var(--red)', cultoJovRows);

  document.getElementById('resultArea').innerHTML = out;
}

document.getElementById("btnPDF").addEventListener("click", () => {
  const area = document.getElementById("resultArea");
  const mesTexto = document.getElementById('previewMes').textContent.replace(/ \/ /g, "-");

  const opt = {
    margin: 12,
    filename: `Rodizio_Cultos_${mesTexto}.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  html2pdf().set(opt).from(area).save();
});

// Inicialização segura carregando dados armazenados
loadSavedNames();

const now = new Date();
document.getElementById('monthPick').value =
  now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
document.getElementById('previewMes').textContent =
  monthShort[now.getMonth()] + ' - ' + now.getFullYear();

document.getElementById('btnGenerate').addEventListener('click', gerarRodizio);
gerarRodizio();
</script>

</body>
</html>
