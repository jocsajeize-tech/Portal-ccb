<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Página de Utilidades CCB — Rodízio</title>

<style>
body{
  font-family:Segoe UI,Arial,sans-serif;
  margin:0;
  background:linear-gradient(135deg,#e9efff,#f7f9ff);
}

.wrap{
  max-width:1100px;
  margin:20px auto;
  background:#fff;
  padding:20px;
  border-radius:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.1);
}

h1{
  text-align:center;
  color:#1e3a8a;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
  margin:14px 0;
}

button{
  border:none;
  padding:8px 14px;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
}

.btn{ background:#2563eb; color:#fff; }
.btn:hover{ background:#1d4ed8; }

.btn-red{ background:#dc2626; color:#fff; }
.btn-red:hover{ background:#b91c1c; }

textarea{
  width:100%;
  min-height:70px;
  border-radius:6px;
  border:1px solid #ccc;
  padding:6px;
  margin-bottom:8px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-bottom:18px;
  border-radius:8px;
  overflow:hidden;
}

th{
  background:#2563eb;
  color:#fff;
}

th,td{
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
}

tr:nth-child(even){
  background:#f3f6ff;
}

.batismo{
  background:#fff3b0 !important;
  font-weight:bold;
}

.stats{
  background:#f1f5ff;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
}
</style>
</head>

<body>
<div class="wrap">

<h1>RODÍZIO MENSAL — CCB</h1>

<div class="controls">
  <input type="month" id="monthPick">
  <button class="btn" onclick="gerarRodizio()">Gerar</button>
  <button class="btn" onclick="salvarRodizio()">Salvar</button>
  <button class="btn" onclick="abrirBatismo()">Adicionar Batismo</button>
  <button class="btn-red" onclick="removerBatismo()">Remover Batismo</button>
</div>

<div class="controls">
  <select id="consultaMes"></select>
  <button onclick="consultarRodizio()">Consultar mês salvo</button>
</div>

<h3>Operadores (1 por linha)</h3>

<textarea id="opsCulto" placeholder="Cultos"></textarea>
<textarea id="opsReuniao" placeholder="Reunião de Jovens"></textarea>
<textarea id="opsEnsaio" placeholder="Ensaio"></textarea>
<textarea id="opsCultoJovem" placeholder="Culto de Jovens"></textarea>

<div id="resultArea"></div>

</div>

<script>
const meses=['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
const dias=['DOM','SEG','TER','QUA','QUI','SEX','SAB'];

function parse(txt){ return txt.split('\n').map(x=>x.trim()).filter(Boolean); }

function gerarRodizio(){
 const mes=monthPick.value;
 if(!mes) return alert('Escolha o mês');
 const [y,m]=mes.split('-').map(Number);

 const opsC=parse(opsCulto.value);
 const opsR=parse(opsReuniao.value);
 const opsE=parse(opsEnsaio.value);
 const opsJ=parse(opsCultoJovem.value);

 if(!opsC.length) return alert("Preencha pelo menos os operadores de Culto");

 let iC=0,iR=0;

 let html=`<h3 style="text-align:center">${meses[m-1]} / ${y}</h3>`;

 html+=tabela('CULTOS',[0,2,4],()=>opsC[iC++%opsC.length],y,m);
 html+=tabela('REUNIÃO DE JOVENS',[0],()=>opsR[iR++%opsR.length],y,m);
 html+=especial('ENSAIO',5,2,opsE,y,m);
 html+=especial('CULTO DE JOVENS',6,2,opsJ,y,m);

 resultArea.innerHTML=html;
 aplicarBatismos();
 gerarEstatisticas();
}

function tabela(titulo,diasSemana,next,y,m){
 let h=`<table><tr><th colspan="4">${titulo}</th></tr>
 <tr><th>Dia</th><th>Data</th><th>Irmão</th><th>Batismo</th></tr>`;
 let d=new Date(y,m-1,1);
 while(d.getMonth()==m-1){
  if(diasSemana.includes(d.getDay())){
   const id=`${y}-${m}-${d.getDate()}`;
   h+=`<tr data-dia="${id}">
   <td>${dias[d.getDay()]}</td>
   <td>${d.getDate()}/${m}</td>
   <td>${next()||''}</td>
   <td></td>
   </tr>`;
  }
  d.setDate(d.getDate()+1);
 }
 return h+'</table>';
}

function especial(titulo,diaSemana,ordem,ops,y,m){
 if(!ops.length) return '';
 let d=new Date(y,m-1,1),c=0;
 while(d.getMonth()==m-1){
  if(d.getDay()==diaSemana){c++;if(c==ordem)break;}
  d.setDate(d.getDate()+1);
 }
 if(d.getMonth()!=m-1) return '';
 const id=`${y}-${m}-${d.getDate()}`;
 return `<table><tr><th colspan="4">${titulo}</th></tr>
 <tr><th>Dia</th><th>Data</th><th>Irmão</th><th>Batismo</th></tr>
 <tr data-dia="${id}">
 <td>${dias[d.getDay()]}</td>
 <td>${d.getDate()}/${m}</td>
 <td>${ops[0]}</td>
 <td></td>
 </tr></table>`;
}

/* BATISMOS */
function abrirBatismo(){
 const dia=prompt("Digite o dia do mês:");
 if(!dia) return;
 const mes=monthPick.value;
 const [y,m]=mes.split('-').map(Number);
 const id=`${y}-${m}-${Number(dia)}`;
 let map=JSON.parse(localStorage.getItem('batismos')||'{}');
 map[id]=true;
 localStorage.setItem('batismos',JSON.stringify(map));
 aplicarBatismos();
}

function removerBatismo(){
 const dia=prompt("Digite o dia para remover batismo:");
 if(!dia) return;
 const mes=monthPick.value;
 const [y,m]=mes.split('-').map(Number);
 const id=`${y}-${m}-${Number(dia)}`;
 let map=JSON.parse(localStorage.getItem('batismos')||'{}');
 delete map[id];
 localStorage.setItem('batismos',JSON.stringify(map));
 aplicarBatismos();
}

function aplicarBatismos(){
 const map=JSON.parse(localStorage.getItem('batismos')||'{}');
 document.querySelectorAll('[data-dia]').forEach(tr=>{
  if(map[tr.dataset.dia]) tr.classList.add('batismo');
  else tr.classList.remove('batismo');
 });
}

/* ESTATÍSTICAS */
function gerarEstatisticas(){
 let contagem={}
 document.querySelectorAll('table td:nth-child(3)').forEach(td=>{
   const nome=td.textContent.trim()
   if(nome){
     contagem[nome]=(contagem[nome]||0)+1
   }
 })
 let html='<div class="stats"><h3>Estatísticas do mês</h3><ul>'
 Object.keys(contagem).forEach(n=>{
   html+=`<li>${n}: ${contagem[n]} vezes</li>`
 })
 html+='</ul></div>'
 resultArea.innerHTML+=html
}

/* SALVAR */
function salvarRodizio(){
 const mes=monthPick.value;
 localStorage.setItem('rodizio-'+mes,resultArea.innerHTML);
 atualizarConsulta();
 alert('Rodízio salvo');
}

function consultarRodizio(){
 const mes=consultaMes.value;
 resultArea.innerHTML=localStorage.getItem('rodizio-'+mes);
 aplicarBatismos();
}

function atualizarConsulta(){
 consultaMes.innerHTML='<option value="">Consultar mês</option>';
 Object.keys(localStorage).filter(k=>k.startsWith('rodizio-')).sort().forEach(k=>{
  const m=k.replace('rodizio-','');
  consultaMes.innerHTML+=`<option value="${m}">${m}</option>`;
 });
}

/* INIT */
monthPick.value=new Date().toISOString().slice(0,7);
atualizarConsulta();
</script>

</body>
</html>
